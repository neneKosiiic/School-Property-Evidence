<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a7f37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2da44e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f8fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eaeef2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ddf4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b6e3ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#ffffff" rx="12"/>
  <rect width="900" height="620" fill="none" rx="12" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="56" width="900" height="16" fill="url(#headerGrad)"/>

  <!-- GitHub mark icon -->
  <circle cx="42" cy="36" r="18" fill="white" opacity="0.2"/>
  <text x="42" y="43" font-size="22" text-anchor="middle" fill="white">⬡</text>

  <text x="70" y="30" font-size="18" font-weight="700" fill="white">School Property Management System</text>
  <text x="70" y="52" font-size="12" fill="#acf2bd">ASP.NET Application · Inventory · Assignments · Maintenance</text>

  <!-- ── LAYER LABELS ── -->
  <text x="24" y="110" font-size="10" font-weight="600" fill="#57606a" letter-spacing="1.2">PRESENTATION LAYER</text>
  <line x1="22" y1="114" x2="878" y2="114" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="24" y="248" font-size="10" font-weight="600" fill="#57606a" letter-spacing="1.2">BUSINESS LOGIC LAYER</text>
  <line x1="22" y1="252" x2="878" y2="252" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="24" y="408" font-size="10" font-weight="600" fill="#57606a" letter-spacing="1.2">DATA ACCESS LAYER</text>
  <line x1="22" y1="412" x2="878" y2="412" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="24" y="530" font-size="10" font-weight="600" fill="#57606a" letter-spacing="1.2">PERSISTENCE</text>
  <line x1="22" y1="534" x2="878" y2="534" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══ PRESENTATION LAYER ══ -->
  <!-- Web Browser -->
  <rect x="34" y="122" width="150" height="116" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="34" y="122" width="150" height="32" rx="8" fill="#0969da"/>
  <rect x="34" y="140" width="150" height="14" fill="#0969da"/>
  <text x="109" y="143" font-size="11" font-weight="700" fill="white" text-anchor="middle">Web Browser</text>
  <text x="109" y="172" font-size="10" fill="#57606a" text-anchor="middle">HTML / CSS / JS</text>
  <text x="109" y="188" font-size="10" fill="#57606a" text-anchor="middle">Razor Views</text>
  <text x="109" y="204" font-size="10" fill="#57606a" text-anchor="middle">Bootstrap UI</text>
  <text x="109" y="220" font-size="10" fill="#57606a" text-anchor="middle">Form Validation</text>

  <!-- Arrow down: Browser → Controllers -->
  <line x1="109" y1="238" x2="109" y2="262" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ASP.NET MVC Controllers -->
  <rect x="230" y="122" width="440" height="116" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="230" y="122" width="440" height="32" rx="8" fill="#6e40c9"/>
  <rect x="230" y="140" width="440" height="14" fill="#6e40c9"/>
  <text x="450" y="143" font-size="11" font-weight="700" fill="white" text-anchor="middle">ASP.NET MVC Controllers</text>

  <!-- Controller boxes -->
  <rect x="244" y="162" width="95" height="64" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="291" y="181" font-size="9.5" font-weight="600" fill="#6e40c9" text-anchor="middle">Inventory</text>
  <text x="291" y="195" font-size="9" fill="#57606a" text-anchor="middle">Controller</text>
  <text x="291" y="210" font-size="8.5" fill="#8c959f" text-anchor="middle">CRUD Items</text>
  <text x="291" y="222" font-size="8.5" fill="#8c959f" text-anchor="middle">Search/Filter</text>

  <rect x="352" y="162" width="95" height="64" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="399" y="181" font-size="9.5" font-weight="600" fill="#6e40c9" text-anchor="middle">Assignment</text>
  <text x="399" y="195" font-size="9" fill="#57606a" text-anchor="middle">Controller</text>
  <text x="399" y="210" font-size="8.5" fill="#8c959f" text-anchor="middle">Assign/Return</text>
  <text x="399" y="222" font-size="8.5" fill="#8c959f" text-anchor="middle">Track Status</text>

  <rect x="460" y="162" width="95" height="64" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="507" y="181" font-size="9.5" font-weight="600" fill="#6e40c9" text-anchor="middle">Maintenance</text>
  <text x="507" y="195" font-size="9" fill="#57606a" text-anchor="middle">Controller</text>
  <text x="507" y="210" font-size="8.5" fill="#8c959f" text-anchor="middle">Log Requests</text>
  <text x="507" y="222" font-size="8.5" fill="#8c959f" text-anchor="middle">Schedule Work</text>

  <rect x="568" y="162" width="88" height="64" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="612" y="181" font-size="9.5" font-weight="600" fill="#6e40c9" text-anchor="middle">Auth</text>
  <text x="612" y="195" font-size="9" fill="#57606a" text-anchor="middle">Controller</text>
  <text x="612" y="210" font-size="8.5" fill="#8c959f" text-anchor="middle">Login/Logout</text>
  <text x="612" y="222" font-size="8.5" fill="#8c959f" text-anchor="middle">Role Mgmt</text>

  <!-- Admin Portal -->
  <rect x="692" y="122" width="184" height="116" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="692" y="122" width="184" height="32" rx="8" fill="#cf222e"/>
  <rect x="692" y="140" width="184" height="14" fill="#cf222e"/>
  <text x="784" y="143" font-size="11" font-weight="700" fill="white" text-anchor="middle">Admin Portal</text>
  <text x="784" y="172" font-size="10" fill="#57606a" text-anchor="middle">User Management</text>
  <text x="784" y="188" font-size="10" fill="#57606a" text-anchor="middle">Role Assignment</text>
  <text x="784" y="204" font-size="10" fill="#57606a" text-anchor="middle">Reports &amp; Exports</text>
  <text x="784" y="220" font-size="10" fill="#57606a" text-anchor="middle">Audit Logs</text>

  <!-- ══ BUSINESS LOGIC LAYER ══ -->
  <!-- Service boxes -->
  <rect x="34" y="262" width="190" height="130" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="34" y="262" width="190" height="30" rx="8" fill="#1a7f37"/>
  <rect x="34" y="278" width="190" height="14" fill="#1a7f37"/>
  <text x="129" y="282" font-size="11" font-weight="700" fill="white" text-anchor="middle">Inventory Service</text>
  <text x="129" y="310" font-size="9.5" fill="#57606a" text-anchor="middle">· Add / Edit / Retire Items</text>
  <text x="129" y="326" font-size="9.5" fill="#57606a" text-anchor="middle">· Category Management</text>
  <text x="129" y="342" font-size="9.5" fill="#57606a" text-anchor="middle">· Barcode / QR Tracking</text>
  <text x="129" y="358" font-size="9.5" fill="#57606a" text-anchor="middle">· Availability Status</text>
  <text x="129" y="374" font-size="9.5" fill="#57606a" text-anchor="middle">· Location Tracking</text>

  <rect x="242" y="262" width="190" height="130" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="242" y="262" width="190" height="30" rx="8" fill="#1a7f37"/>
  <rect x="242" y="278" width="190" height="14" fill="#1a7f37"/>
  <text x="337" y="282" font-size="11" font-weight="700" fill="white" text-anchor="middle">Assignment Service</text>
  <text x="337" y="310" font-size="9.5" fill="#57606a" text-anchor="middle">· Assign to User / Room</text>
  <text x="337" y="326" font-size="9.5" fill="#57606a" text-anchor="middle">· Return &amp; Handover Flow</text>
  <text x="337" y="342" font-size="9.5" fill="#57606a" text-anchor="middle">· Due Date Reminders</text>
  <text x="337" y="358" font-size="9.5" fill="#57606a" text-anchor="middle">· Assignment History</text>
  <text x="337" y="374" font-size="9.5" fill="#57606a" text-anchor="middle">· Condition on Return</text>

  <rect x="450" y="262" width="190" height="130" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="262" width="190" height="30" rx="8" fill="#1a7f37"/>
  <rect x="450" y="278" width="190" height="14" fill="#1a7f37"/>
  <text x="545" y="282" font-size="11" font-weight="700" fill="white" text-anchor="middle">Maintenance Service</text>
  <text x="545" y="310" font-size="9.5" fill="#57606a" text-anchor="middle">· Submit Repair Requests</text>
  <text x="545" y="326" font-size="9.5" fill="#57606a" text-anchor="middle">· Schedule &amp; Dispatch</text>
  <text x="545" y="342" font-size="9.5" fill="#57606a" text-anchor="middle">· Status Tracking</text>
  <text x="545" y="358" font-size="9.5" fill="#57606a" text-anchor="middle">· Cost Recording</text>
  <text x="545" y="374" font-size="9.5" fill="#57606a" text-anchor="middle">· Maintenance History</text>

  <rect x="658" y="262" width="218" height="130" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="658" y="262" width="218" height="30" rx="8" fill="#9a6700"/>
  <rect x="658" y="278" width="218" height="14" fill="#9a6700"/>
  <text x="767" y="282" font-size="11" font-weight="700" fill="white" text-anchor="middle">Notification &amp; Auth Service</text>
  <text x="767" y="310" font-size="9.5" fill="#57606a" text-anchor="middle">· Email Alerts &amp; Reminders</text>
  <text x="767" y="326" font-size="9.5" fill="#57606a" text-anchor="middle">· ASP.NET Identity Auth</text>
  <text x="767" y="342" font-size="9.5" fill="#57606a" text-anchor="middle">· Role-Based Access (RBAC)</text>
  <text x="767" y="358" font-size="9.5" fill="#57606a" text-anchor="middle">· Admin / Staff / Viewer</text>
  <text x="767" y="374" font-size="9.5" fill="#57606a" text-anchor="middle">· Audit Trail Logging</text>

  <!-- ══ DATA ACCESS LAYER ══ -->
  <rect x="34" y="422" width="400" height="96" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="34" y="422" width="400" height="30" rx="8" fill="#0969da"/>
  <rect x="34" y="438" width="400" height="14" fill="#0969da"/>
  <text x="234" y="441" font-size="11" font-weight="700" fill="white" text-anchor="middle">Entity Framework Core (ORM / Repository Pattern)</text>
  <text x="234" y="468" font-size="9.5" fill="#57606a" text-anchor="middle">DbContext · LINQ Queries · Migrations</text>
  <text x="234" y="484" font-size="9.5" fill="#57606a" text-anchor="middle">Generic Repository · Unit of Work · Code-First Schema</text>
  <text x="234" y="500" font-size="9.5" fill="#57606a" text-anchor="middle">Eager Loading · Pagination · Soft Delete</text>

  <rect x="452" y="422" width="424" height="96" rx="8" fill="url(#moduleGrad)" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="452" y="422" width="424" height="30" rx="8" fill="#0969da"/>
  <rect x="452" y="438" width="424" height="14" fill="#0969da"/>
  <text x="664" y="441" font-size="11" font-weight="700" fill="white" text-anchor="middle">External Integrations</text>
  <text x="664" y="468" font-size="9.5" fill="#57606a" text-anchor="middle">SMTP Email Service · File Storage (uploads/photos)</text>
  <text x="664" y="484" font-size="9.5" fill="#57606a" text-anchor="middle">QR / Barcode Generator · PDF Report Export</text>
  <text x="664" y="500" font-size="9.5" fill="#57606a" text-anchor="middle">Excel Export · Optional REST API Endpoints</text>

  <!-- ══ PERSISTENCE ══ -->
  <!-- SQL Server DB -->
  <rect x="34" y="544" width="250" height="60" rx="8" fill="url(#dbGrad)" stroke="#54aeff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="159" y="568" font-size="12" font-weight="700" fill="#0969da" text-anchor="middle">🗄  SQL Server Database</text>
  <text x="159" y="590" font-size="9.5" fill="#0969da" text-anchor="middle">Items · Assignments · Maintenance · Users</text>

  <!-- Tables -->
  <rect x="300" y="544" width="135" height="60" rx="8" fill="#fff8c5" stroke="#d4a72c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="367" y="568" font-size="10" font-weight="700" fill="#9a6700" text-anchor="middle">📋 Key Tables</text>
  <text x="367" y="582" font-size="8.5" fill="#57606a" text-anchor="middle">Items · Categories</text>
  <text x="367" y="595" font-size="8.5" fill="#57606a" text-anchor="middle">Assignments · Repairs</text>

  <!-- Roles -->
  <rect x="450" y="544" width="135" height="60" rx="8" fill="#fff8c5" stroke="#d4a72c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="517" y="568" font-size="10" font-weight="700" fill="#9a6700" text-anchor="middle">👥 Roles</text>
  <text x="517" y="582" font-size="8.5" fill="#57606a" text-anchor="middle">Administrator</text>
  <text x="517" y="595" font-size="8.5" fill="#57606a" text-anchor="middle">Staff · Viewer</text>

  <!-- File Storage -->
  <rect x="600" y="544" width="135" height="60" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="667" y="568" font-size="10" font-weight="700" fill="#1a7f37" text-anchor="middle">📁 File Storage</text>
  <text x="667" y="582" font-size="8.5" fill="#57606a" text-anchor="middle">Item Photos</text>
  <text x="667" y="595" font-size="8.5" fill="#57606a" text-anchor="middle">Documents</text>

  <!-- Reports -->
  <rect x="750" y="544" width="126" height="60" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="813" y="568" font-size="10" font-weight="700" fill="#1a7f37" text-anchor="middle">📊 Reports</text>
  <text x="813" y="582" font-size="8.5" fill="#57606a" text-anchor="middle">PDF / Excel</text>
  <text x="813" y="595" font-size="8.5" fill="#57606a" text-anchor="middle">Audit Logs</text>

  <!-- ── Arrows (vertical connectors between layers) ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8c959f"/>
    </marker>
  </defs>
  <!-- Browser ↔ Controllers -->
  <line x1="184" y1="180" x2="230" y2="180" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="230" y1="190" x2="184" y2="190" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Controllers → Services -->
  <line x1="291" y1="238" x2="129" y2="262" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="399" y1="238" x2="337" y2="262" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="507" y1="238" x2="545" y2="262" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="660" y1="238" x2="767" y2="262" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Services → EF Core -->
  <line x1="129" y1="392" x2="180" y2="422" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="337" y1="392" x2="280" y2="422" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="545" y1="392" x2="480" y2="422" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="767" y1="392" x2="700" y2="422" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- EF Core → DB -->
  <line x1="234" y1="518" x2="180" y2="544" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- Integrations → Storage/Reports -->
  <line x1="600" y1="518" x2="667" y2="544" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="750" y1="518" x2="813" y2="544" stroke="#8c959f" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
